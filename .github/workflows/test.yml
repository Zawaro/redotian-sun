name: Tests

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

jobs:
  check-openspec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check no open changes in openspec/changes
        run: |
          forbidden=$(find openspec/changes/ -mindepth 1 -maxdepth 1 -type d ! -name archive)
          if [ -n "$forbidden" ]; then
            echo "ERROR: Open changes found in openspec/changes/:"
            echo "$forbidden"
            echo ""
            echo "All changes must be archived before merging."
            echo "Run: openspec archive <change-name>"
            exit 1
          fi
          echo "OK: No open changes in openspec/changes/"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Redot binary
        id: cache-redot
        uses: actions/cache@v4
        with:
          path: ~/redot
          key: redot-26.1-stable-linux-x64

      - name: Download Redot
        if: steps.cache-redot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/redot
          curl -L -o ~/redot/redot.zip \
            "https://github.com/Redot-Engine/redot-engine/releases/download/redot-26.1-stable/Redot_v26.1-stable_linux_x64.zip"
          cd ~/redot && unzip redot.zip
          chmod +x ~/redot/Redot_v26.1-stable_linux.x86_64

      - name: Import project assets
        run: |
          ~/redot/Redot_v26.1-stable_linux.x86_64 --headless --import

      - name: Run tests
        run: |
          ~/redot/Redot_v26.1-stable_linux.x86_64 --headless -s test/run_tests.gd
